version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 24
        - npm ci --no-audit --no-fund
        # postbuild renders /resume to PDF via Playwright headless Chromium.
        # Amplify's build image does not ship browsers; install on demand
        # and rely on the cache below to keep subsequent builds fast.
        # Both chromium and chromium-headless-shell are required: Playwright
        # 1.49+ launches the headless-shell binary by default and it is
        # packaged separately.
        - npx playwright install chromium chromium-headless-shell
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - /root/.cache/ms-playwright/**/*
# Security headers are documented below for reference but Amplify ignores
# the `customHeaders:` block in amplify.yml at the CloudFront layer. The
# *source of truth* for production headers is the Amplify app config,
# applied via `aws amplify update-app --custom-headers ...`. See
# `docs/DEPLOYMENT.md` "Security headers (Amplify custom-headers)".
#
# customHeaders:
#   - pattern: "**/*"
#     headers:
#       - key: "Strict-Transport-Security"
#         value: "max-age=31536000; includeSubDomains; preload"
#       - key: "Referrer-Policy"
#         value: "strict-origin-when-cross-origin"
#       - key: "Permissions-Policy"
#         value: "camera=(), microphone=(), geolocation=(), interest-cohort=()"
#       - key: "X-Content-Type-Options"
#         value: "nosniff"
#       - key: "X-Frame-Options"
#         value: "DENY"
#       - key: "Cross-Origin-Opener-Policy"
#         value: "same-origin"
