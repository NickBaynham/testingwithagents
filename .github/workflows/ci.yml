name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  FORCE_COLOR: 1

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run lint:md

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # postbuild (scripts/generate-resume-pdf.tsx) renders /resume to PDF
      # via Playwright headless Chromium. Playwright 1.49+ launches the
      # `chromium-headless-shell` binary by default, which is shipped as a
      # separate package from `chromium`. Install both so postbuild's
      # `chromium.launch()` finds its executable.
      - run: npx playwright install chromium chromium-headless-shell
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            out
            public
          retention-days: 1

  e2e:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium chromium-headless-shell
      - uses: actions/download-artifact@v4
        with:
          name: next-build
      - name: Run Playwright e2e
        env:
          CI: "true"
        run: npx playwright test --grep-invert @a11y

  a11y:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium chromium-headless-shell
      - uses: actions/download-artifact@v4
        with:
          name: next-build
      - name: Run axe-core a11y suite
        env:
          CI: "true"
        run: npx playwright test --grep @a11y

  linkcheck:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: next-build
      - name: lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir is required so root-relative links in out/*.html
          # (e.g. /about/, /_next/...) resolve against the static export
          # directory rather than failing with "Cannot convert path ... to
          # a URI". Mirrors the docker-compose lychee invocation.
          args: --config ./lychee.toml --root-dir ./out ./**/*.md ./out/**/*.html
          fail: true

  deploy:
    needs: [lint, typecheck, unit, build, e2e, a11y, linkcheck]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Trigger Amplify release
        id: release
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          # `aws amplify start-job` fails with LimitExceededException when a
          # build for this branch is already running. Treat that as success -
          # whichever path triggered the in-flight build will deploy this
          # commit. Any other error still fails the step.
          set +e
          out=$(aws amplify start-job --app-id "$AMPLIFY_APP_ID" --branch-name main --job-type RELEASE 2>&1)
          code=$?
          echo "$out"
          if [ $code -eq 0 ]; then
            job_id=$(echo "$out" | python3 -c "import sys,json; print(json.load(sys.stdin)['jobSummary']['jobId'])" 2>/dev/null || echo "")
            echo "job_id=$job_id" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if echo "$out" | grep -q "LimitExceededException"; then
            echo "Another Amplify build for main is already running; treating as deployed."
            exit 0
          fi
          exit $code
      - name: Wait for Amplify build to finish
        if: steps.release.outputs.job_id != ''
        env:
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
          JOB_ID: ${{ steps.release.outputs.job_id }}
        run: |
          # Poll Amplify until the build settles. 15-minute ceiling.
          for i in $(seq 1 30); do
            status=$(aws amplify get-job --app-id "$AMPLIFY_APP_ID" --branch-name main --job-id "$JOB_ID" --query 'job.summary.status' --output text)
            echo "Amplify job $JOB_ID status: $status"
            case "$status" in
              SUCCEED) exit 0 ;;
              FAILED|CANCELLED) exit 1 ;;
            esac
            sleep 30
          done
          echo "Amplify job $JOB_ID did not settle within 15 minutes." >&2
          exit 1

  post-deploy-smoke:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium chromium-headless-shell
      - name: Run live smoke + security-headers specs
        env:
          # The canonical preview / production URL for main. Update via the
          # AMPLIFY_LIVE_URL repo variable when the custom domain lands in
          # Phase 5.
          LIVE_URL: ${{ vars.AMPLIFY_LIVE_URL || 'https://main.d2f2x4ij8pxn6g.amplifyapp.com' }}
          SECURITY_HEADERS_URL: ${{ vars.AMPLIFY_LIVE_URL || 'https://main.d2f2x4ij8pxn6g.amplifyapp.com' }}
          CI: "true"
        run: npx playwright test tests/e2e/post-deploy-smoke.spec.ts tests/e2e/security-headers.spec.ts --project=chromium-desktop
