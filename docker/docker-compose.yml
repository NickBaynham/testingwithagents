services:
  plausible-db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres

  plausible-events-db:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    volumes:
      - plausible-events-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: ghcr.io/plausible/community-edition:v3.0.1
    restart: unless-stopped
    depends_on:
      - plausible-db
      - plausible-events-db
    ports:
      - "8000:8000"
    environment:
      BASE_URL: http://localhost:8000
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE:-please-set-a-64-char-secret-in-env-local-before-running}
      DATABASE_URL: postgres://postgres:postgres@plausible-db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events_db

  lychee:
    image: lycheeverse/lychee:latest
    profiles: ["tools"]
    working_dir: /workspace
    # Mounted read-only on purpose: lychee should not need to write anywhere
    # in the repo. Cache is disabled in lychee.toml for the same reason.
    volumes:
      - ..:/workspace:ro
    command:
      - --config
      - /workspace/lychee.toml
      # Root-relative URLs in the static export (e.g. /about/, /_next/...)
      # resolve against /workspace/out/.
      - --root-dir
      - /workspace/out
      - --
      - "./out/**/*.html"
      - "./*.md"
      - "./docs/**/*.md"
      - "./plan/**/*.md"
      - "./requirements/**/*.md"

volumes:
  plausible-db-data:
  plausible-events-data:
